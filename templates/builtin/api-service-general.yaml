id: "tpl-api-general"
name: "API 服务通用测试模板"
version: "1.0.0"
source: "builtin"
metadata:
  author: "AutoChecklist"
  tags:
    - "api"
    - "backend"
    - "service"
  project_type: "api"
  description: "适用于后端 API 服务的通用测试检查模板，覆盖接口正确性、参数校验、认证授权、错误处理和性能限流五大维度。"
categories:
  - name: "接口正确性"
    description: "验证 API 接口的功能正确性和数据一致性"
    items:
      - title: "CRUD 操作验证"
        description: "验证资源的创建、读取、更新、删除操作"
        priority: "critical"
        rules:
          - "验证 POST 创建资源后返回正确的 201 状态码和资源数据"
          - "验证 GET 获取资源返回完整且准确的数据"
          - "验证 PUT/PATCH 更新资源后数据一致性"
          - "验证 DELETE 删除资源后无法再次获取"
      - title: "响应格式验证"
        description: "验证 API 响应的数据格式和结构"
        priority: "high"
        rules:
          - "验证响应 Content-Type 与约定一致"
          - "验证响应 JSON 结构符合 API 文档定义"
          - "验证分页响应包含 total、page、page_size 等元数据"
      - title: "业务逻辑验证"
        description: "验证接口的业务规则和约束"
        priority: "critical"
        rules:
          - "验证业务唯一性约束（如名称不重复）"
          - "验证状态机转换规则（如订单状态流转）"
          - "验证关联数据的级联操作"
  - name: "参数校验"
    description: "验证 API 输入参数的校验和处理"
    items:
      - title: "必填参数校验"
        description: "验证必填参数缺失时的错误处理"
        priority: "high"
        rules:
          - "验证缺少必填字段时返回 422 并包含明确错误信息"
          - "验证必填字段为空字符串时的处理"
          - "验证必填字段为 null 时的处理"
      - title: "参数类型与格式校验"
        description: "验证参数的类型和格式约束"
        priority: "high"
        rules:
          - "验证字符串字段的长度限制"
          - "验证数值字段的范围限制"
          - "验证日期、邮箱、URL 等格式字段"
          - "验证枚举字段的值范围"
      - title: "边界值与特殊字符"
        description: "验证参数的边界条件和特殊输入"
        priority: "medium"
        rules:
          - "验证字符串最大长度边界"
          - "验证数值上下界"
          - "验证包含特殊字符（Unicode、emoji）的输入"
          - "验证超大 payload 的处理"
  - name: "认证授权"
    description: "验证 API 的认证和授权机制"
    items:
      - title: "认证验证"
        description: "验证 API 的认证机制"
        priority: "critical"
        rules:
          - "验证无 Token 请求返回 401"
          - "验证过期 Token 返回 401 并包含过期提示"
          - "验证篡改 Token 返回 401"
      - title: "授权验证"
        description: "验证 API 的权限控制"
        priority: "critical"
        rules:
          - "验证普通用户无法访问管理员接口"
          - "验证用户只能操作自己的资源"
          - "验证跨租户数据隔离"
      - title: "会话管理"
        description: "验证会话和 Token 管理"
        priority: "high"
        rules:
          - "验证 Token 刷新机制"
          - "验证并发登录策略"
  - name: "错误处理"
    description: "验证 API 的错误处理和异常响应"
    items:
      - title: "HTTP 状态码规范"
        description: "验证不同错误场景返回正确的 HTTP 状态码"
        priority: "high"
        rules:
          - "验证资源不存在返回 404"
          - "验证权限不足返回 403"
          - "验证参数错误返回 422"
          - "验证冲突操作返回 409"
      - title: "错误响应格式"
        description: "验证错误响应的结构化格式"
        priority: "medium"
        rules:
          - "验证错误响应包含 error_code 和 message"
          - "验证错误信息对调用方有指导意义"
          - "验证错误响应不泄露内部实现细节"
      - title: "异常容错"
        description: "验证后端异常时的容错处理"
        priority: "high"
        rules:
          - "验证数据库连接失败时的降级响应"
          - "验证第三方服务超时时的超时处理"
          - "验证未知异常的 500 兆底处理"
  - name: "性能与限流"
    description: "验证 API 的性能和流量控制"
    items:
      - title: "响应时间"
        description: "验证 API 的响应时间是否满足 SLA"
        priority: "high"
        rules:
          - "验证列表接口 P99 响应时间 < 500ms"
          - "验证详情接口 P99 响应时间 < 200ms"
          - "验证大数据量查询的分页性能"
      - title: "限流策略"
        description: "验证 API 的流量控制机制"
        priority: "medium"
        rules:
          - "验证超过限流阈值返回 429"
          - "验证限流响应包含 Retry-After 头"
      - title: "幂等性"
        description: "验证写操作的幂等性"
        priority: "high"
        rules:
          - "验证重复 POST 请求不会创建重复资源"
          - "验证重复 PUT 请求结果一致"
exclusions:
  - pattern: "基础设施层（数据库、缓存、消息队列）的内部行为"
    reason: "基础设施由运维团队保证"
  - pattern: "第三方 API 的内部实现"
    reason: "第三方服务由供应商保证"
settings:
  min_cases_per_category: 3
  require_edge_cases: true
  priority_weights:
    critical: 1.0
    high: 0.8
    medium: 0.5
    low: 0.3
